<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipe">
<meta name="theme-color" content="#4A2E15">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>La Mia Collezione di Pipe</title>
<style>
:root {
  --t: #8B5E3C;
  --tl: #C49A6C;
  --td: #4A2E15;
  --cr: #F5EFE6;
  --ash: #B5A898;
  --em: #C0392B;
  --pg: #F2EBE0;
  --wh: #FFFFFF;
  --ink: #2C1810;
  --st: env(safe-area-inset-top,0px);
  --sb: env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--pg);color:var(--ink);font-size:15px;}

/* APP SHELL - 3 views: home, detail, form */
.view{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--pg);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);will-change:transform;}
.view.hidden{transform:translateX(100%);}

/* TOPBAR */
.topbar{background:var(--td);padding:calc(var(--st) + 12px) 14px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tb-back{background:rgba(255,255,255,0.12);border:none;color:var(--cr);font-size:1rem;padding:6px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.tb-back:active{background:rgba(255,255,255,0.25);}
.tb-title{flex:1;font-size:1rem;font-weight:600;color:var(--cr);}
.tb-btn{background:rgba(255,255,255,0.12);border:none;color:var(--cr);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-btn:active{background:rgba(255,255,255,0.25);}
.tb-badge{background:var(--t);color:var(--cr);font-size:0.7rem;padding:2px 9px;border-radius:10px;white-space:nowrap;}

/* SCROLL */
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* HOME */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 14px calc(var(--sb) + 80px);}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr);}}

/* EMPTY */
.empty{text-align:center;padding:70px 30px;color:var(--ash);}
.empty-ico{font-size:4rem;margin-bottom:16px;}
.empty p{font-size:0.95rem;line-height:1.6;}
.empty-cta{margin-top:20px;background:var(--td);color:var(--cr);border:none;padding:12px 24px;border-radius:10px;font-size:0.9rem;cursor:pointer;}

/* CARD */
.card{background:var(--wh);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(74,46,21,0.1);cursor:pointer;}
.card:active{opacity:0.82;}
.card-ph{width:100%;aspect-ratio:4/3;background:var(--cr);display:flex;align-items:center;justify-content:center;font-size:2.8rem;color:rgba(139,94,60,0.22);overflow:hidden;}
.card-ph img{width:100%;height:100%;object-fit:cover;}
.card-info{padding:9px 10px 11px;}
.card-name{font-size:0.88rem;font-weight:600;color:var(--td);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-marca{font-size:0.72rem;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.card-tag{display:inline-block;background:var(--pg);color:var(--ash);font-size:0.6rem;padding:1px 6px;border-radius:4px;margin-top:5px;}
.card-stars{font-size:0.7rem;margin-top:3px;}
.son{color:var(--tl);}.soff{color:rgba(139,94,60,0.18);}

/* FAB */
.fab{position:fixed;bottom:calc(var(--sb)+22px);right:18px;width:56px;height:56px;border-radius:50%;background:var(--td);color:var(--cr);font-size:1.8rem;border:none;box-shadow:0 4px 16px rgba(74,46,21,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.fab:active{transform:scale(0.92);}

/* DETAIL VIEW */
.det-photo{width:100%;max-height:240px;object-fit:cover;display:block;}
.det-nophoto{width:100%;height:160px;background:var(--cr);display:flex;align-items:center;justify-content:center;font-size:5rem;color:rgba(139,94,60,0.2);}
.det-body{padding:18px 18px calc(var(--sb)+80px);}
.det-name{font-size:1.3rem;font-weight:700;color:var(--td);margin-bottom:2px;}
.det-marca{font-size:0.85rem;color:var(--t);margin-bottom:10px;}
.det-stars{font-size:1.1rem;margin-bottom:10px;}
.det-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.det-tag{background:var(--pg);color:var(--td);font-size:0.75rem;padding:4px 10px;border-radius:6px;font-weight:500;}
.tE{background:#d4edda!important;color:#1a5c2a!important;}
.tO{background:#cce5ff!important;color:#1a3c5c!important;}
.tB{background:#fff3cd!important;color:#6b4c00!important;}
.tD{background:#f8d7da!important;color:#6b1a1a!important;}
.tR{background:#f0e0d0!important;color:#6b3a10!important;}
.det-lbl{font-size:0.68rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ash);margin-top:14px;margin-bottom:3px;}
.det-val{font-size:0.92rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.det-actions{display:flex;gap:10px;margin-top:22px;padding-top:14px;border-top:1px solid rgba(139,94,60,0.1);}
.det-btn{flex:1;padding:12px;border-radius:10px;font-size:0.88rem;font-weight:600;border:none;cursor:pointer;}
.det-btn:active{opacity:0.75;}
.det-edit{background:var(--pg);color:var(--td);}
.det-del{background:rgba(192,57,43,0.1);color:var(--em);}

/* FORM VIEW */
.form-scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--sb)+30px);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.68rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--t);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid rgba(139,94,60,0.2);border-radius:10px;font-size:0.95rem;font-family:inherit;color:var(--ink);background:var(--pg);outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--tl);background:#fff;}
.field textarea{resize:none;min-height:120px;line-height:1.5;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stars-inp{display:flex;gap:10px;margin-top:2px;}
.star-t{font-size:2rem;cursor:pointer;color:rgba(139,94,60,0.2);line-height:1;}
.star-t.on{color:var(--tl);}
.photo-box{border:2px dashed rgba(139,94,60,0.25);border-radius:12px;padding:20px;text-align:center;position:relative;background:var(--pg);}
.photo-box input[type=file]{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none;padding:0;}
.photo-lbl{font-size:0.88rem;color:var(--ash);pointer-events:none;}
.photo-lbl span{display:block;font-size:2rem;margin-bottom:4px;}
.photo-thumb{width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:10px;display:none;}
.save-btn{width:100%;background:var(--td);color:var(--cr);border:none;padding:15px;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px;}
.save-btn:active{background:var(--t);}

/* MENU OVERLAY */
.menu-overlay{position:fixed;inset:0;background:rgba(26,8,3,0.5);z-index:200;display:none;align-items:flex-end;}
.menu-overlay.open{display:flex;}
.menu-sheet{background:var(--wh);border-radius:20px 20px 0 0;width:100%;padding-bottom:calc(var(--sb)+10px);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);}
.menu-overlay.open .menu-sheet{transform:translateY(0);}
.menu-handle{width:36px;height:4px;background:rgba(139,94,60,0.2);border-radius:2px;margin:12px auto 8px;}
.menu-item{display:flex;align-items:center;gap:14px;padding:15px 20px;border-bottom:1px solid rgba(139,94,60,0.08);cursor:pointer;font-size:0.95rem;}
.menu-item:active{background:var(--pg);}
.mi-icon{font-size:1.3rem;width:28px;text-align:center;}
.mi-sub{font-size:0.75rem;color:var(--ash);margin-top:1px;}
.menu-danger{color:var(--em);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sb)+85px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--td);color:var(--cr);padding:9px 18px;border-radius:20px;font-size:0.85rem;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SAVE ERROR */
.save-error{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:0.85rem;color:var(--em);display:none;}
</style>
</head>
<body>

<!-- VIEW: HOME -->
<div class="view" id="viewHome">
  <div class="topbar">
    <div class="tb-title">🪵 La Mia Collezione</div>
    <span class="tb-badge" id="countBadge">0 pipe</span>
    <button class="tb-btn" onclick="esporta()" title="Esporta">💾</button>
    <label class="tb-btn" title="Importa" style="cursor:pointer;">📂<input type="file" accept=".json" onchange="importa(event)" style="display:none;"></label>
    <button class="tb-btn" onclick="openMenu()">⋯</button>
  </div>
  <div class="scrl">
    <div id="emptyState" class="empty">
      <div class="empty-ico">🪵</div>
      <p>La collezione è ancora vuota.<br>Tocca <strong>+</strong> per aggiungere la prima pipa.</p>
      <button class="empty-cta" onclick="goForm(null)">➕ Aggiungi la prima pipa</button>
    </div>
    <div class="grid" id="grid" style="display:none;"></div>
  </div>
  <button class="fab" onclick="goForm(null)">+</button>
</div>

<!-- VIEW: DETTAGLIO -->
<div class="view hidden" id="viewDetail">
  <div class="topbar">
    <button class="tb-back" onclick="goHome()">← Collezione</button>
    <div class="tb-title" id="detTitle"></div>
    <button class="tb-btn" id="detEditBtn" onclick="goFormEdit()">✏️</button>
  </div>
  <div class="scrl">
    <div id="detailContent"></div>
  </div>
</div>

<!-- VIEW: FORM -->
<div class="view hidden" id="viewForm">
  <div class="topbar">
    <button class="tb-back" onclick="goBack()">← Indietro</button>
    <div class="tb-title" id="formTitle">Nuova Pipa</div>
    <button class="tb-btn" onclick="salvaPipa()" style="font-size:0.75rem;width:auto;padding:0 10px;letter-spacing:0.05em;">SALVA</button>
  </div>
  <div class="form-scrl">
    <div class="frow">
      <div class="field"><label>Nome / Modello *</label><input type="text" id="f-nome" placeholder="es. Billiard 320" autocomplete="off"></div>
      <div class="field"><label>Produttore</label><input type="text" id="f-marca" placeholder="es. Savinelli" autocomplete="off"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Forma</label>
        <select id="f-forma"><option value="">—</option><option>Billiard</option><option>Bent</option><option>Dublin</option><option>Calabash</option><option>Churchwarden</option><option>Pot</option><option>Apple / Roundhead</option><option>Freehand</option><option>Altra</option></select>
      </div>
      <div class="field"><label>Materiale</label>
        <select id="f-materiale"><option value="">—</option><option>Radica</option><option>Meerschaum</option><option>Mais</option><option>Morta</option><option>Altro</option></select>
      </div>
    </div>
    <div class="frow">
      <div class="field"><label>Anno</label><input type="text" id="f-anno" placeholder="es. 1979" autocomplete="off"></div>
      <div class="field"><label>Stato</label>
        <select id="f-stato"><option value="">—</option><option>Eccellente</option><option>Ottimo</option><option>Buono</option><option>Discreto</option><option>Da restaurare</option></select>
      </div>
    </div>
    <div class="field"><label>Tabacco preferito</label><input type="text" id="f-tabacco" placeholder="es. Escudo, FVF…" autocomplete="off"></div>
    <div class="field">
      <label>Valutazione</label>
      <div class="stars-inp" id="starsInp">
        <span class="star-t" onclick="setRating(1)">★</span>
        <span class="star-t" onclick="setRating(2)">★</span>
        <span class="star-t" onclick="setRating(3)">★</span>
        <span class="star-t" onclick="setRating(4)">★</span>
        <span class="star-t" onclick="setRating(5)">★</span>
      </div>
    </div>
    <div class="field">
      <label>Note personali</label>
      <textarea id="f-note" placeholder="Provenienza, sensazioni di fumo, storia, dove l'hai trovata…"></textarea>
    </div>
    <div class="field">
      <label>Foto</label>
      <div class="photo-box">
        <input type="file" accept="image/*" id="f-foto" onchange="handlePhoto(event)">
        <div class="photo-lbl"><span>📷</span>Tocca per aggiungere una foto</div>
        <img class="photo-thumb" id="photoThumb" alt="">
      </div>
    </div>
    <div class="save-error" id="saveError"></div>
    <button class="save-btn" onclick="salvaPipa()">Salva nella collezione</button>
  </div>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="if(event.target===this)closeMenu()">
  <div class="menu-sheet">
    <div class="menu-handle"></div>
    <div class="menu-item" onclick="esporta();closeMenu()">
      <span class="mi-icon">💾</span><div><div>Esporta backup</div><div class="mi-sub">Salva file JSON su iCloud Drive</div></div>
    </div>
    <label class="menu-item">
      <span class="mi-icon">📂</span><div><div>Importa backup</div><div class="mi-sub">Ripristina da file JSON</div></div>
      <input type="file" accept=".json" onchange="importa(event);closeMenu();" style="display:none;">
    </label>
    <div class="menu-item menu-danger" onclick="svuota();closeMenu()">
      <span class="mi-icon">🗑</span><div><div>Svuota collezione</div><div class="mi-sub">Elimina tutte le pipe (esporta prima!)</div></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var KEY = 'pipe_pwa_v2';
var rating = 0;
var editId = null;
var currentDetailId = null;

// ── STORAGE ──
function getCol() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e) { return []; }
}

function setCol(data) {
  try {
    localStorage.setItem(KEY, JSON.stringify(data));
    return true;
  } catch(e) {
    // Storage pieno - prova a salvare senza foto
    return false;
  }
}

// Comprimi foto prima di salvare
function compressPhoto(dataUrl, callback) {
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var MAX = 800;
    var w = img.width, h = img.height;
    if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
    else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.72));
  };
  img.src = dataUrl;
}

// ── NAVIGATION ──
function goHome() {
  document.getElementById('viewHome').classList.remove('hidden');
  document.getElementById('viewDetail').classList.add('hidden');
  document.getElementById('viewForm').classList.add('hidden');
  render();
}

function goDetail(id) {
  currentDetailId = id;
  renderDetail(id);
  document.getElementById('viewHome').classList.add('hidden');
  document.getElementById('viewDetail').classList.remove('hidden');
  document.getElementById('viewForm').classList.add('hidden');
}

function goForm(id) {
  editId = id;
  resetForm();
  if (id) {
    var p = getCol().find(function(x){ return x.id === id; });
    if (p) fillForm(p);
    document.getElementById('formTitle').textContent = 'Modifica Pipa';
  } else {
    document.getElementById('formTitle').textContent = 'Nuova Pipa';
  }
  document.getElementById('viewHome').classList.add('hidden');
  document.getElementById('viewDetail').classList.add('hidden');
  document.getElementById('viewForm').classList.remove('hidden');
}

function goFormEdit() {
  goForm(currentDetailId);
}

function goBack() {
  if (editId && currentDetailId) {
    goDetail(currentDetailId);
  } else {
    goHome();
  }
}

// ── TOAST ──
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ── MENU ──
function openMenu() { document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }

// ── FORM ──
function resetForm() {
  ['f-nome','f-marca','f-anno','f-tabacco','f-note'].forEach(function(id){ document.getElementById(id).value = ''; });
  ['f-forma','f-materiale','f-stato'].forEach(function(id){ document.getElementById(id).value = ''; });
  document.getElementById('f-foto').value = '';
  var th = document.getElementById('photoThumb');
  th.src = ''; th.style.display = 'none';
  rating = 0; updateStars();
  document.getElementById('saveError').style.display = 'none';
}

function fillForm(p) {
  document.getElementById('f-nome').value = p.nome || '';
  document.getElementById('f-marca').value = p.marca || '';
  document.getElementById('f-forma').value = p.forma || '';
  document.getElementById('f-materiale').value = p.materiale || '';
  document.getElementById('f-anno').value = p.anno || '';
  document.getElementById('f-stato').value = p.stato || '';
  document.getElementById('f-tabacco').value = p.tabacco || '';
  document.getElementById('f-note').value = p.note || '';
  rating = p.rating || 0; updateStars();
  if (p.foto) {
    var th = document.getElementById('photoThumb');
    th.src = p.foto; th.style.display = 'block';
  }
}

function setRating(v) { rating = (rating === v) ? 0 : v; updateStars(); }
function updateStars() {
  document.querySelectorAll('.star-t').forEach(function(s, i){ s.classList.toggle('on', i < rating); });
}

function handlePhoto(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    compressPhoto(ev.target.result, function(compressed) {
      var th = document.getElementById('photoThumb');
      th.src = compressed; th.style.display = 'block';
    });
  };
  reader.readAsDataURL(file);
}

// ── SALVA ──
function salvaPipa() {
  var nome = document.getElementById('f-nome').value.trim();
  if (!nome) { toast('⚠️ Inserisci il nome della pipa'); return; }

  var th = document.getElementById('photoThumb');
  var foto = (th.src && th.src.startsWith('data:')) ? th.src : null;

  var p = {
    id: editId || Date.now(),
    nome: nome,
    marca: document.getElementById('f-marca').value.trim(),
    forma: document.getElementById('f-forma').value,
    materiale: document.getElementById('f-materiale').value,
    anno: document.getElementById('f-anno').value.trim(),
    stato: document.getElementById('f-stato').value,
    tabacco: document.getElementById('f-tabacco').value.trim(),
    note: document.getElementById('f-note').value,
    rating: rating,
    foto: foto,
    dataAggiunta: new Date().toLocaleDateString('it-IT')
  };

  var col = getCol();

  if (editId) {
    var idx = col.findIndex(function(x){ return x.id === editId; });
    if (idx !== -1) {
      if (!p.foto) p.foto = col[idx].foto; // mantieni foto esistente
      col[idx] = p;
    }
  } else {
    col.unshift(p);
  }

  // Prova a salvare
  var ok = setCol(col);

  if (!ok) {
    // Prova senza foto
    var pNoFoto = Object.assign({}, p, { foto: null });
    var colNoFoto = col.map(function(x){ return x.id === p.id ? pNoFoto : x; });
    ok = setCol(colNoFoto);
    if (ok) {
      var err = document.getElementById('saveError');
      err.textContent = '⚠️ Pipa salvata ma la foto è stata esclusa — spazio browser insufficiente. Usa il backup JSON per conservare le foto.';
      err.style.display = 'block';
      toast('✓ Salvata (senza foto per spazio)');
      setTimeout(function(){
        currentDetailId = p.id;
        goDetail(p.id);
      }, 1800);
      return;
    } else {
      toast('❌ Errore salvataggio — prova a svuotare la cache');
      return;
    }
  }

  toast(editId ? '✓ Pipa aggiornata' : '✓ Pipa aggiunta');
  currentDetailId = p.id;
  setTimeout(function(){ goDetail(p.id); }, 600);
}

// ── ELIMINA ──
function eliminaPipa(id) {
  if (!confirm('Eliminare questa pipa?')) return;
  setCol(getCol().filter(function(p){ return p.id !== id; }));
  toast('Pipa eliminata');
  goHome();
}

// ── RENDER DETAIL ──
function renderDetail(id) {
  var p = getCol().find(function(x){ return x.id === id; });
  if (!p) { goHome(); return; }

  document.getElementById('detTitle').textContent = p.nome;

  var stars = '';
  for (var i = 1; i <= 5; i++) stars += '<span class="'+(i<=(p.rating||0)?'son':'soff')+'">★</span>';

  var fotoHtml = p.foto
    ? '<img class="det-photo" src="'+p.foto+'" alt="'+p.nome+'">'
    : '<div class="det-nophoto">🪵</div>';

  var tags = [];
  if (p.forma) tags.push('<span class="det-tag">'+p.forma+'</span>');
  if (p.materiale) tags.push('<span class="det-tag">'+p.materiale+'</span>');
  if (p.anno) tags.push('<span class="det-tag">'+p.anno+'</span>');
  if (p.stato) {
    var sc = {Eccellente:'tE',Ottimo:'tO',Buono:'tB',Discreto:'tD','Da restaurare':'tR'}[p.stato]||'';
    tags.push('<span class="det-tag '+sc+'">'+p.stato+'</span>');
  }

  var html = fotoHtml +
    '<div class="det-body">'+
      '<div class="det-name">'+p.nome+'</div>'+
      (p.marca ? '<div class="det-marca">'+p.marca+'</div>' : '')+
      (p.rating ? '<div class="det-stars">'+stars+'</div>' : '')+
      (tags.length ? '<div class="det-tags">'+tags.join('')+'</div>' : '')+
      (p.tabacco ? '<div class="det-lbl">Tabacco preferito</div><div class="det-val">'+p.tabacco+'</div>' : '')+
      (p.note ? '<div class="det-lbl">Note</div><div class="det-val">'+escHtml(p.note)+'</div>' : '')+
      (p.dataAggiunta ? '<div class="det-lbl" style="margin-top:16px;">Aggiunta il</div><div class="det-val">'+p.dataAggiunta+'</div>' : '')+
      '<div class="det-actions">'+
        '<button class="det-btn det-edit" onclick="goFormEdit()">✏️ Modifica</button>'+
        '<button class="det-btn det-del" onclick="eliminaPipa('+p.id+')">🗑 Elimina</button>'+
      '</div>'+
    '</div>';

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailContent').parentElement.scrollTop = 0;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── RENDER HOME ──
function render() {
  var col = getCol();
  var n = col.length;
  document.getElementById('countBadge').textContent = n + (n === 1 ? ' pipa' : ' pipe');
  var empty = document.getElementById('emptyState');
  var grid = document.getElementById('grid');
  if (n === 0) { empty.style.display = 'block'; grid.style.display = 'none'; return; }
  empty.style.display = 'none'; grid.style.display = 'grid';
  grid.innerHTML = col.map(function(p) {
    var foto = p.foto
      ? '<div class="card-ph"><img src="'+p.foto+'" alt="'+p.nome+'"></div>'
      : '<div class="card-ph">🪵</div>';
    var stars = '';
    if (p.rating) for (var i=1;i<=5;i++) stars += '<span class="'+(i<=p.rating?'son':'soff')+'">★</span>';
    return '<div class="card" onclick="goDetail('+p.id+')">'+foto+
      '<div class="card-info">'+
        '<div class="card-name">'+p.nome+'</div>'+
        (p.marca?'<div class="card-marca">'+p.marca+'</div>':'')+
        (p.forma?'<span class="card-tag">'+p.forma+'</span>':'')+
        (stars?'<div class="card-stars">'+stars+'</div>':'')+
      '</div></div>';
  }).join('');
}

// ── BACKUP ──
function esporta() {
  var col = getCol();
  if (!col.length) { toast('Collezione vuota'); return; }
  var blob = new Blob([JSON.stringify({version:2,data:col,esportato:new Date().toISOString()},null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pipe-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('💾 Backup esportato');
}

function importa(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var parsed = JSON.parse(ev.target.result);
      var data = parsed.data || parsed;
      if (!Array.isArray(data)) throw new Error('Formato non valido');
      if (!confirm('Importare '+data.length+' pipe? I dati attuali verranno sostituiti.')) return;
      setCol(data); render(); goHome();
      toast('✓ '+data.length+' pipe importate');
    } catch(err) { alert('Errore: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function svuota() {
  if (!confirm('Eliminare TUTTA la collezione?\n\nAssicurati di aver esportato un backup prima!')) return;
  setCol([]); render(); goHome(); toast('Collezione svuotata');
}

// ── INIT ──
render();
</script>
</body>
</html>
